name: Build and Release GDExtension

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*"

jobs:
  build:
    name: Compile for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true 
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: universal

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: python -m pip install scons

      - name: Compile Release Target
        run: scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }}

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: project/addons/posterizer/bin/ 

  release:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows
          path: release_staging/addons/posterizer/bin/

      - name: Download Linux Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: release_staging/addons/posterizer/bin/

      - name: Download macOS Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos
          path: release_staging/addons/posterizer/bin/

      - name: Prepare Final Package
        run: |
          rsync -av --exclude='bin' project/addons/ release_staging/addons/ 
          
          cd release_staging
          zip -r ../posterizer-addon.zip addons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: posterizer-addon.zip
          generate_release_notes: false